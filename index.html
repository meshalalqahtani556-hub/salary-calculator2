<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحاسبة الذكية</title>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#6366f1;
--text:#fff;
}

body.light{
--bg:#f3f4f6;
--card:#fff;
--text:#111;
}

body{
margin:0;
font-family:sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
}

/* App */
.app{
max-width:420px;
margin:30px auto;
padding:20px;
}

/* Card */
.card{
background:var(--card);
padding:20px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
backdrop-filter: blur(10px);
}

/* Header */
.header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.title{font-size:18px;font-weight:bold}

.toggle{cursor:pointer}

/* Tabs */
.tabs{
display:flex;
background:rgba(255,255,255,.1);
border-radius:12px;
padding:4px;
margin-bottom:15px;
}

.tab{
flex:1;
text-align:center;
padding:8px;
border-radius:10px;
cursor:pointer;
}

.tab.active{
background:var(--accent);
}

/* Inputs */
input,select{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
background:rgba(255,255,255,.1);
color:var(--text);
}

/* Button */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#6366f1,#8b5cf6);
color:white;
margin-top:10px;
cursor:pointer;
}

/* Results */
.result{
margin-top:15px;
display:grid;
gap:10px;
}

.box{
background:rgba(255,255,255,.1);
padding:10px;
border-radius:10px;
text-align:center;
}

/* hidden */
.hidden{display:none}
</style>
</head>

<body>

<div class="app">
<div class="card">

<div class="header">
<div class="title">⚡ الحاسبة الذكية</div>
<div class="toggle" onclick="toggle()">🌙</div>
</div>

<div class="tabs">
<div class="tab active" onclick="tab('salary')">راتب</div>
<div class="tab" onclick="tab('loan')">قرض</div>
</div>

<!-- salary -->
<div id="salary">
<select id="nat">
<option value="sa">سعودي</option>
<option value="non">غير سعودي</option>
</select>

<input id="basic" placeholder="الراتب">
<input id="house" placeholder="بدل سكن">
<input id="trans" placeholder="نقل">

<button onclick="salary()">احسب</button>

<div class="result" id="res1"></div>
</div>

<!-- loan -->
<div id="loan" class="hidden">
<input id="amount" placeholder="مبلغ القرض">
<input id="rate" placeholder="الفائدة %">
<input id="years" placeholder="سنوات">

<button onclick="loan()">احسب</button>

<div class="result" id="res2"></div>
</div>

</div>
</div>

<script>
function toggle(){
document.body.classList.toggle("light");
localStorage.setItem("mode",document.body.classList.contains("light"));
}

window.onload=()=>{
if(localStorage.getItem("mode")==="true"){
document.body.classList.add("light");
}
}

// tabs
function tab(x){
salaryDiv.classList.add("hidden");
loanDiv.classList.add("hidden");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.getElementById(x).classList.remove("hidden");

if(x==="salary"){
document.querySelectorAll(".tab")[0].classList.add("active");
}else{
document.querySelectorAll(".tab")[1].classList.add("active");
}
}

// salary calc
function salary(){
let b=+basic.value||0;
let h=+house.value||0;
let t=+trans.value||0;
let nat=nat.value;

let total=b+h+t;
let ins=nat==="sa"?b*0.1:b*0.02;
let net=total-ins;

res1.innerHTML=`
<div class="box">💵 ${total} ريال</div>
<div class="box">🏦 ${ins} تأمينات</div>
<div class="box">✅ ${net} صافي</div>
`;

localStorage.setItem("salary",res1.innerHTML);
}

// loan calc
function loan(){
let P=+amount.value||0;
let r=(+rate.value||0)/100/12;
let n=(+years.value||0)*12;

if(!P||!r||!n){
res2.innerHTML="⚠️ أدخل البيانات";
return;
}

let m=(P*r)/(1-Math.pow(1+r,-n));
let total=m*n;

res2.innerHTML=`
<div class="box">💳 ${m.toFixed(0)} شهري</div>
<div class="box">📊 ${total.toFixed(0)} إجمالي</div>
`;

localStorage.setItem("loan",res2.innerHTML);
}
</script>

</body>
</html>
