<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة الراتب والقروض</title>

<style>
:root{
    --main:#4f46e5;
    --bg:#f3f4f6;
    --card:#ffffff;
    --text:#111;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#fff;
}

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition:0.3s;
}

/* كرت التطبيق */
.app{
    max-width:420px;
    margin:40px auto;
    background:var(--card);
    border-radius:20px;
    padding:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* العنوان */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.toggle{
    cursor:pointer;
    font-size:18px;
}

/* Tabs */
.tabs{
    display:flex;
    background:#e5e7eb;
    border-radius:12px;
    padding:5px;
    margin-bottom:15px;
}

body.dark .tabs{
    background:#334155;
}

.tab{
    flex:1;
    text-align:center;
    padding:8px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.tab.active{
    background:var(--main);
    color:white;
}

/* Inputs */
input,select{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:12px;
    border:none;
    background:#f1f5f9;
}

body.dark input,body.dark select{
    background:#334155;
    color:white;
}

/* زر */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#6366f1,#4f46e5);
    color:white;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* النتيجة */
.result{
    margin-top:15px;
    padding:15px;
    border-radius:12px;
    background:#f8fafc;
    animation:fade 0.3s;
}

body.dark .result{
    background:#334155;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px)}
    to{opacity:1; transform:translateY(0)}
}

/* اخفاء */
.hidden{display:none}

/* إعلان */
.ads{
    margin-top:15px;
    padding:10px;
    text-align:center;
    border-radius:10px;
    background:#e5e7eb;
}

body.dark .ads{
    background:#334155;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
    <div class="title">💰 الحاسبة الذكية</div>
    <div class="toggle" onclick="toggleDark()">🌙</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('salary')">راتب</div>
    <div class="tab" onclick="showTab('loan')">قرض</div>
</div>

<!-- الراتب -->
<div id="salary">
    <select id="nat">
        <option value="sa">سعودي</option>
        <option value="non">غير سعودي</option>
    </select>

    <input type="number" id="basic" placeholder="الراتب الأساسي">
    <input type="number" id="house" placeholder="بدل السكن">
    <input type="number" id="trans" placeholder="بدل النقل">

    <button onclick="calcSalary()">احسب</button>

    <div class="result" id="resSalary">✨ النتيجة هنا</div>
</div>

<!-- القروض -->
<div id="loan" class="hidden">
    <input type="number" id="amount" placeholder="مبلغ القرض">
    <input type="number" id="rate" placeholder="الفائدة %">
    <input type="number" id="years" placeholder="عدد السنوات">

    <button onclick="calcLoan()">احسب</button>

    <div class="result" id="resLoan">✨ النتيجة هنا</div>
</div>

<div class="ads">📢 إعلان</div>

</div>

<script>
// Dark mode
function toggleDark(){
    document.body.classList.toggle("dark");
}

// Tabs
function showTab(tab){
    document.getElementById("salary").classList.add("hidden");
    document.getElementById("loan").classList.add("hidden");

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

    document.getElementById(tab).classList.remove("hidden");

    if(tab==="salary"){
        document.querySelectorAll(".tab")[0].classList.add("active");
    }else{
        document.querySelectorAll(".tab")[1].classList.add("active");
    }
}

// Salary
function calcSalary(){
    let nat = nat.value;
    let basic = +document.getElementById("basic").value || 0;
    let house = +document.getElementById("house").value || 0;
    let trans = +document.getElementById("trans").value || 0;

    let total = basic + house + trans;
    let ins = nat==="sa"? basic*0.10 : basic*0.02;
    let net = total - ins;

    resSalary.innerHTML = `
    💵 ${total} ريال <br>
    🏦 ${ins} تأمينات <br>
    ✅ ${net} صافي
    `;
}

// Loan
function calcLoan(){
    let P = +amount.value || 0;
    let r = (+rate.value || 0)/100/12;
    let n = (+years.value || 0)*12;

    if(!P||!r||!n){
        resLoan.innerHTML="⚠️ أدخل البيانات";
        return;
    }

    let m = (P*r)/(1-Math.pow(1+r,-n));
    let total = m*n;

    resLoan.innerHTML = `
    💳 ${m.toFixed(0)} ريال / شهر <br>
    📊 ${total.toFixed(0)} الإجمالي
    `;
}
</script>

</body>
</html>
